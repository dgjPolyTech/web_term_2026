<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>DGJS 유지보수 문의 게시판</title>
    <link rel="stylesheet" th:href="@{/common.css}">
    <link rel="stylesheet" th:href="@{/view_main.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: common_header}"></div>

    <main class="main-container">
        <div class="notice-wrap">
            <h2 class="notice-title">유지보수 서비스 이용 유의사항</h2>
            <ul class="notice-list">
                <li>정확한 지원을 위해 문의 시 기관명과 시스템명을 반드시 입력해 주세요.</li>
                <li>오류 문의의 경우 에러 메시지나 구체적인 발생 일시를 함께 적어주시면 신속히 처리됩니다.</li>
                <li>개인정보 보호를 위해 본문에 비밀번호, 주민등록번호 등의 민감 정보는 기재를 금지합니다.</li>
            </ul>
        </div>

        <th:block sec:authorize="isAuthenticated()">
        <form class="search-wrap" th:action="@{/main}" method="get">
            <select name="searchType" class="search-select">
                <option value="title" th:selected="${param.searchType != null and param.searchType[0] == 'title'}">제목</option>
                <option value="organization" th:selected="${param.searchType != null and param.searchType[0] == 'organization'}">기관</option>
                <option value="requester" th:selected="${param.searchType != null and param.searchType[0] == 'requester'}">작성자</option>
                <option value="status" th:selected="${param.searchType != null and param.searchType[0] == 'status'}">처리여부</option>
            </select>
            <input type="text" name="keyword" class="search-input" placeholder="검색어를 입력하세요" th:value="${param.keyword}">
            <button type="submit" class="search-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </form>

        <table class="board-table">
            <thead>
                <tr>
                    <th style="width: 20%;">제목</th>
                    <th style="width: 10%;">기관</th>
                    <th style="width: 30%;">내용</th>
                    <th style="width: 10%;">작성자</th>
                    <th style="width: 10%;">작성일</th>
                    <th style="width: 10%;">담당자</th>
                    <th style="width: 10%;">처리 여부</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(inquiryList)}">
                    <td colspan="7" style="text-align: center; padding: 40px 0; color: #666; font-size: 15px;">
                        검색 조건에 일치하는 게시글이 없습니다.
                    </td>
                </tr>
                <tr th:each="inquiry : ${inquiryList}">
                    <td class="text-left">
                        <a th:href="@{/detail(id=${inquiry.inquiryId})}" th:text="${inquiry.title}">제목</a>
                    </td>
                    <td th:text="${inquiry.organization}">기관</td>
                    <td class="text-left" th:text="${inquiry.contents}">내용</td>
                    <td th:text="${inquiry.requester}">작성자</td>
                    <td th:text="${#temporals.format(inquiry.registrationDate, 'yyyy-MM-dd')}">작성일</td>
                    <td th:text="${inquiry.manager}">담당자</td>
                    <td>
                        <span th:if="${inquiry.status.name() == 'WAITING'}" class="badge badge-waiting">처리 대기</span>
                        <span th:if="${inquiry.status.name() == 'IN_PROGRESS'}" class="badge badge-progress">진행 중</span>
                        <span th:if="${inquiry.status.name() == 'DONE'}" class="badge badge-done">처리 완료</span>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="pagination" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="flex-grow: 1; text-align: center;">
                &lt; 1/10 &gt;
            </div>
            <div>
                <a th:href="@{/input}" class="btn-write" sec:authorize="hasRole('USER')" style="padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">글쓰기</a>
            </div>
        </div>
        </th:block>
        
        <th:block sec:authorize="!isAuthenticated()">
            <div style="text-align: center; padding: 50px 0; font-size: 16px; color: #555; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;">
                게시글 열람은 로그인이 필요합니다.
            </div>
        </th:block>
    </main>

    <div th:replace="~{fragments/footer :: common_footer}"></div>
</body>
</html>
