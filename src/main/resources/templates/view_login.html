<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DGJS 유지보수 문의 게시판 - 로그인</title>
    <link rel="stylesheet" th:href="@{/common.css}">
    <link rel="stylesheet" th:href="@{/login.css}">
</head>
<body>

<div th:replace="~{fragments/header :: common_header}"></div>

<main class="login-container">
    <div class="login-box">
        <h2>로그인</h2>
        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label for="username">ID</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">PW</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </form>
    </div>
</main>

<div th:replace="~{fragments/footer :: common_footer}"></div>

</body>
</html>
