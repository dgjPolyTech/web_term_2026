<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <header class="header" th:fragment="common_header">
        <div class="header-inner">
            <h1 class="logo"><span class="brand-highlight">DGJS</span> 유지보수 문의 게시판</h1>
            <div class="user-menu">
                <span class="welcome-msg" sec:authorize="hasRole('ADMIN')">Admin 님, 환영합니다.</span>
                <span class="welcome-msg" sec:authorize="hasRole('USER')">User 님, 환영합니다.</span>
                <span class="welcome-msg" sec:authorize="!isAuthenticated()">로그인이 필요합니다.</span>
                <a href="#" sec:authorize="isAuthenticated()">사용자 정보</a>
                <a th:href="@{/logout}" sec:authorize="isAuthenticated()">로그아웃</a>
                <a th:href="@{/login}" sec:authorize="!isAuthenticated()">로그인</a>
            </div>
        </div>
    </header>
</body>
</html>
