<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGJS 유지보수 문의 게시판</title>
    <link rel="stylesheet" href="view_input.css">
</head>
<body>

<header class="top-bar">
    <div class="header-container">
        <h1 class="logo">DGJS <span>유지보수 문의 게시판</span></h1>
        <button type="button" class="logout-btn">로그아웃</button>
    </div>
</header>

<main class="content-container">
    <div class="action-bar">
        <button type="button" class="nav-btn">메인 페이지</button>
<!--        아래 기능은 추후 고도화 시 추가 -->
<!--        <span class="info-text">* 기관 정보 및 작성일은 등록 시 자동 입력됩니다.</span>-->
    </div>

    <form th:action="@{/input}" method="post" enctype="multipart/form-data">
        <div class="form-container">
            <table class="form-table">
            <colgroup>
                <col style="width: 20%;">
                <col style="width: 80%;">
            </colgroup>
            <tbody>
            <tr>
                <th>제목 <span class="required">*</span></th>
                <td>
                    <input type="text" name="title" class="input-text" placeholder="제목을 입력해 주세요." required>
                </td>
            </tr>
            <tr>
                <th>작성자명 <span class="required">*</span></th>
                <td>
                    <input type="text" name="requester" class="input-text short" value="" required>
                </td>
            </tr>
            <tr>
                <th>소속 기관 <span class="required">*</span></th>
                <td>
                    <input type="text" name="organization" class="input-text short" value="" required>
                </td>
            </tr>
            <tr>
                <th>담당자 <span class="required">*</span></th>
                <td>
                    <input type="text" name="manager" class="input-text short" value="김담당">
                </td>
            </tr>
            <tr>
                <th>내용 <span class="required">*</span></th>
                <td>
                    <textarea name="contents" class="input-textarea" placeholder="내용을 입력해 주세요." oninput="this.style.height = 'auto'; this.style.height = (this.scrollHeight + 2) + 'px';" required></textarea>
                </td>
            </tr>
            <tr>
                <th>파일 첨부</th>
                <td>
                    <div class="file-upload-box">
                        <!-- 'name="attachedFile"' 은 Inquiry 객체의 MultipartFile 필드명과 일치해야 합니다 -->
                        <input type="file" id="file-input" name="attachedFile">
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-submit">등록</button>
            <button type="button" class="btn btn-delete" th:onclick="|location.href='@{/main}'|">취소</button>
        </div>
    </form>
</main>

</body>
</html>
