<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGJS 유지보수 문의 게시판</title>
    <link rel="stylesheet" th:href="@{/common.css}">
    <link rel="stylesheet" th:href="@{/view_input.css}">
</head>

<body>

    <div th:replace="~{fragments/header :: common_header}"></div>

    <main class="content-container">
        <div class="action-bar">
            <button type="button" class="nav-btn" th:onclick="|location.href='@{/main}'|">메인 페이지</button>
            <!--        아래 기능은 추후 고도화 시 추가 -->
            <!--        <span class="info-text">* 기관 정보 및 작성일은 등록 시 자동 입력됩니다.</span>-->
        </div>

        <form th:action="@{${inquiry == null ? '/input' : (reply == null ? '/reply' : '/reply/update')}}" method="post"
            enctype="multipart/form-data">
            <th:block th:if="${inquiry != null}">
                <input type="hidden" name="inquiryId" th:value="${inquiry.inquiryId}">
            </th:block>
            <th:block th:if="${reply != null}">
                <input type="hidden" name="replyId" th:value="${reply.replyId}">
            </th:block>
            <div class="form-container">
                <table class="form-table">
                    <colgroup>
                        <col style="width: 20%;">
                        <col style="width: 80%;">
                    </colgroup>
                    <tbody>
                        <tr>
                            <th>제목 <span class="required">*</span></th>
                            <td>
                                <input type="text" name="title" class="input-text" placeholder="제목을 입력해 주세요." required
                                    th:value="${#authorization.expression('hasRole(''ADMIN'')') and inquiry != null ? '[' + inquiry.title + '에 대한 답변]' : ''}">
                            </td>
                        </tr>
                        <tr>
                            <th>작성자명 <span class="required">*</span></th>
                            <td>
                                <th:block sec:authorize="hasRole('USER')">
                                    김유저
                                    <input type="hidden" name="requester" value="김유저">
                                </th:block>
                                <th:block sec:authorize="!hasRole('USER')">
                                    <span th:text="${inquiry != null ? inquiry.requester : ''}"></span>
                                    <input type="hidden" name="requester"
                                        th:value="${inquiry != null ? inquiry.requester : ''}">
                                </th:block>
                            </td>
                        </tr>
                        <tr>
                            <th>소속 기관 <span class="required">*</span></th>
                            <td>
                                <th:block sec:authorize="hasRole('USER')">
                                    <select name="organization" class="input-text short" required style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                                        <option value="" disabled selected>선택해 주세요</option>
                                        <option value="서울시청">서울시청</option>
                                        <option value="강남구청">강남구청</option>
                                        <option value="서초구청">서초구청</option>
                                    </select>
                                </th:block>
                                <th:block sec:authorize="!hasRole('USER')">
                                    <span th:text="${inquiry != null ? inquiry.organization : ''}"></span>
                                    <input type="hidden" name="organization"
                                        th:value="${inquiry != null ? inquiry.organization : ''}">
                                </th:block>
                            </td>
                        </tr>
                        <tr>
                            <th>담당자 <span class="required">*</span></th>
                            <td>
                                <th:block sec:authorize="hasRole('ADMIN')">
                                    김담당
                                    <input type="hidden" name="manager" value="김담당">
                                </th:block>
                                <th:block sec:authorize="!hasRole('ADMIN')">
                                    <input type="text" name="manager" class="input-text short">
                                </th:block>
                            </td>
                        </tr>
                        <tr sec:authorize="hasRole('ADMIN')" th:if="${inquiry != null}">
                            <th>처리 상태</th>
                            <td>
                                <select name="status" class="input-text short" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                                    <option value="WAITING" th:selected="${inquiry?.status?.name() == 'WAITING'}">처리 대기</option>
                                    <option value="IN_PROGRESS" th:selected="${inquiry?.status?.name() == 'IN_PROGRESS'}">진행 중</option>
                                    <option value="DONE" th:selected="${inquiry?.status?.name() == 'DONE'}">처리 완료</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <th>내용 <span class="required">*</span></th>
                            <td>
                                <textarea th:name="${inquiry != null ? 'replyContents' : 'contents'}"
                                    class="input-textarea" placeholder="내용을 입력해 주세요."
                                    oninput="this.style.height = 'auto'; this.style.height = (this.scrollHeight + 2) + 'px';"
                                    required th:text="${reply != null ? reply.replyContents : ''}"></textarea>
                            </td>
                        </tr>
                        <tr>
                            <th>파일 첨부</th>
                            <td>
                                <div class="file-upload-box">
                                    <!-- 'name="attachedFile"' 은 Inquiry 객체의 MultipartFile 필드명과 일치해야 합니다 -->
                                    <input type="file" id="file-input" name="attachedFile">
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-submit">등록</button>
                <button type="button" class="btn btn-delete" th:onclick="|location.href='@{/main}'|">취소</button>
            </div>
        </form>
    </main>

    <div th:replace="~{fragments/footer :: common_footer}"></div>
</body>

</html>
